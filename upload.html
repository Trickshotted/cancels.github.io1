<!DOCTYPE HTML>
<html>

<head>
  <script src="https://cdn.jsdelivr.net/npm/faunadb@latest/dist/faunadb.js"></script>
  <link href="https://fonts.googleapis.com/css?family=Red+Hat+Text" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Disclonger || Upload</title>
</head>
  <style>

  @font-face {
  font-family: 'Red Hat Text';
  font-style: normal;
  font-weight: 400;
  src: url(https://fonts.gstatic.com/s/redhattext/v6/RrQCbohi_ic6B3yVSzGBrMx6ZI_cy1A6Ok2ML7hwZr_QcLVF.woff2) format('woff2');
  unicode-range: U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;

::-webkit-scrollbar {
  width: 10px;
  height: 10px;   
}

 
/* Handle */
::-webkit-scrollbar-thumb {
  background: #474747; 
  border-radius: 2px;
}

/* Handle on hover */

  background: #4f4f4f; 
}

body {font-family: Red Hat Text;}
* {box-sizing: border-box;}
  
  /* Full-width input fields */
input[type=text], input[type=password] {
  width: 100%;
  padding: 15px;

  border: none;

/* Set a style for all buttons */
button {
  background-color: #3d3d3d;

  opacity:1;
}

/* Extra styles for the cancel button */

  padding: 14px 20px;

/* Float cancel and signup buttons and add an equal width */

  float: left;
  width: 50%;
}

/* Add padding to container elements */
.container {
  padding: 16px;
}

/* Clear floats */
.clearfix::after {
  content: "";
  clear: both;
  display: table;

     width: 100%;

<body style="background-color:#262626">
  <form style="border:1px solid #ccc">
  <div class="container">
    <h1 style="color:white">Create DiscLonger</h1>
    <p style="color:white">Create a longer discord message.</p>
    <hr>

    <label style="color:white" for="name"><b>URL Ending</b></label>
    <input maxlength="25" type="text" placeholder="Enter an ending for the URL..." name="name" id="name" required>
    
     <label style="color:white" for="token"><b>Token</b></label>
    <input type="text" placeholder="Enter a token..." name="token" id="token" required>

     <label style="color:white" for="channelid"><b>Channel ID</b></label>
    <input type="text" placeholder="Enter an ID..." name="channelid" id="channelid" required>
    
    <label style="color:white" for="content"><b>Message Content</b></label>
    <textarea  style="width: 100%; resize: vertical; font-family:'Red Hat Text'; padding: 15px; margin: 5px 0 22px 0; border: none; background: #303030; caret-color: white; color: white" placeholder="Enter content..." name="content" id="content" required></textarea>
  
    <div class="clearfix">
      <button type="button" onclick="create()" class="signupbtn">Upload DiscLonger</button>
    </div>
  </div>

  
  <script>
     var faunadb = window.faunadb
  var q = faunadb.query
  var client = new faunadb.Client({
    secret: 'fnAEWN0RMFAAwFxR2C5vwBRsORnw7OriYRS0cvVd',
    domain: 'db.eu.fauna.com',
    scheme: 'https',
  })
 
  function makeid(length) {
    var result           = '';
    var characters       = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    var charactersLength = characters.length;
    for ( var i = 0; i < length; i++ ) {
      result += characters.charAt(Math.floor(Math.random() * 
 charactersLength));
   }
   return result;
}
    
async function create(){
  
client.query(
  q.Get(
    q.Match(q.Index('posts_by_url_name'), document.getElementById("name").value)
  )
)
.then((ret) => 
      alert("This URL is already taken.")

)
  
.catch(async function(e){
 

var response = await fetch("https://discord.com/api/v9/users/@me", {
  "headers": {
    "authorization": document.getElementById("token").value,
  }
});
const data = await response.json();

var response2 = await fetch("https://discord.com/api/v9/channels/" + document.getElementById("channelid").value, {
  "headers": {
    "authorization": document.getElementById("token").value,
  }
});
const data2 = await response2.json();

var response3 = await fetch("https://discord.com/api/v9/guilds/" + data2.guild_id, {
  "headers": {
    "authorization": document.getElementById("token").value
    
  }
});
const data3 = await response3.json();

fetch("https://discord.com/api/v9/channels/" + data2.id + "/messages", {
  "headers": {
    "authorization": document.getElementById("token").value,
    "content-type": "application/json"
  },
  "body": "{\"content\":\"" + "**" + document.getElementById("content").value.substring(0,55) + "...**" + "\\n\\n*Read more: " + "https://cancels.github.io/?" + document.getElementById("name").value + "*\"}",
  "method": "POST",
});


const monthNames = ["January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"];
    const dateObj = new Date();
    const month = monthNames[dateObj.getMonth()];
    const day = String(dateObj.getDate()).padStart(2, '0');
    const year = dateObj.getFullYear();
    const output = month  + ' '+ day  + ', ' + year;
 


    client.query(
  q.Create(
    q.Collection('disclonger'),
    { data: { url: document.getElementById("name").value, username: data.username, tag: "#" + data.discriminator, contents: document.getElementById("content").value.replace(new RegExp('\n','g'), 'linebreak'), pfp: "https://cdn.discordapp.com/avatars/" + data.id + "/" + data.avatar + ".png", date: output, sentto: "<b>#" + data2.name + "</b> in <b>" + data3.name + "</b>"} },
  )
)
.then((ret) =>
     console.log(ret)
     )
});


}
    </script>
</body>

</html>
