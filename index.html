function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

var cheatmode = false;

async function begingamble(){

    document.getElementById("gamblestatus").style.fontSize = "20px";

if (document.getElementById("quantity").value >= jcoins + 1)
{
alert("You cant gamble this much")

}
else{
    if(cheatmode == false)
    {

                 let Gamble = [
               "Win",
               "Lose"]
                 let Result = Gamble[Math.floor(Math.random() * Gamble.length)]

                 for (let i = 0; i < 15; i++) {
                 document.getElementById("gamblestatus").innerHTML = "Win";
                 await sleep(100);
                 document.getElementById("gamblestatus").innerHTML = "Lose";
                 await sleep(100);
                 }

                 document.getElementById("gamblestatus").innerHTML = Result;


            if(Result == "Win")
            {   
                jcoins = jcoins + Number(document.getElementById("quantity").value);
                document.getElementById("coindisplay").innerHTML = jcoins + " J-Coins";
                document.getElementById("gamblestatus").innerHTML = "You win " + document.getElementById("quantity").value + " J-Coins";
                            }

            if(Result == "Lose")
            {
                jcoins = jcoins - Number(document.getElementById("quantity").value);
                document.getElementById("coindisplay").innerHTML = jcoins + " J-Coins";
                document.getElementById("gamblestatus").innerHTML = "You lost " + document.getElementById("quantity").value + " J-Coins";
            }

                 let size = 20;
                 for (let i = 0; i < 10; i++) {
                 document.getElementById("gamblestatus").style.fontSize = size + "px";
                 size++;
                 await sleep(5);
                 }
    }
