<!DOCTYPE HTML>
<html>

<head>
  <script src="https://cdn.jsdelivr.net/npm/faunadb@latest/dist/faunadb.js"></script>
  <link href="https://fonts.googleapis.com/css?family=Red+Hat+Text" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="http://fonts.cdnfonts.com/css/whitney-2" rel="stylesheet">
  <title>DiscLogger</title>
</head>
  <style>

  @font-face {
  font-family: 'Red Hat Text';
  font-style: normal;
  font-weight: 400;
  src: url(https://fonts.gstatic.com/s/redhattext/v6/RrQCbohi_ic6B3yVSzGBrMx6ZI_cy1A6Ok2ML7hwZr_QcLVF.woff2) format('woff2');
  unicode-range: U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;
}
    
    @font-face {
    font-family: 'Whitney Light';
    font-style: normal;
    font-weight: 500;
    src: local('Whitney Light'), url('https://fonts.cdnfonts.com/s/38487/whitneylight.woff') format('woff');
}

::-webkit-scrollbar {
  width: 10px;
  height: 10px;   
}

 
/* Handle */
::-webkit-scrollbar-thumb {
  background: #474747; 
  border-radius: 2px;
}

/* Handle on hover */
::-webkit-scrollbar-thumb:hover {
  background: #4f4f4f; 
}

body {font-family: Whitney Light;}
* {box-sizing: border-box;}
  
  /* Full-width input fields */
input[type=text], input[type=password] {
  width: 100%;
  padding: 15px;
  margin: 5px 0 22px 0;
  display: inline-block;
  border: none;
  background: #36393F;
  caret-color: white;
  color: white
}

input[type=text]:focus, input[type=password]:focus {
  background-color: #43474f;
  outline: none;
}

hr {
  border: 1px solid #f1f1f1;
  margin-bottom: 25px;
}

/* Set a style for all buttons */
button {
  background-color: #5865F2;
  color: white;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  width: 100%;
  opacity: 0.9;
}

button:hover {
  opacity:1;
}

/* Extra styles for the cancel button */
.cancelbtn {
  padding: 14px 20px;
  background-color: #f44336;
}

/* Float cancel and signup buttons and add an equal width */
.cancelbtn, .signupbtn {
  float: left;
  width: 50%;
}

/* Add padding to container elements */
.container {
  padding: 16px;
}

/* Clear floats */
.clearfix::after {
  content: "";
  clear: both;
  display: table;
}

/* Change styles for cancel button and signup button on extra small screens */
@media screen and (max-width: 300px) {
  .cancelbtn, .signupbtn {
     width: 100%;
  }
}

</style>

<body style="background-color:#292B2F">
  <form style="border:1px solid #ccc">
  <div class="container">
    <h1 style="color:white">Capture a Discord Message</h1>
    <p id="result" style="color:white">Log Discord Messages in a Permanent URL.</p>
    <hr>
    
     <label style="color:white" for="token"><b>Token</b></label>
    <input type="password" placeholder="Enter a token..." name="token" id="token" required>

     <label style="color:white" for="channelid"><b>Channel ID</b></label>
    <input type="text" placeholder="Enter an ID..." name="channelid" id="channelid" required>
   
  
    <div class="clearfix">
      <button type="button" onclick="create()" class="signupbtn">Capture Latest Message</button>
    </div>
  </div>

  
  <script>
     var faunadb = window.faunadb
  var q = faunadb.query
  var client = new faunadb.Client({
    secret: 'fnAEWN0RMFAAwFxR2C5vwBRsORnw7OriYRS0cvVd',
    domain: 'db.eu.fauna.com',
    scheme: 'https',
  })
 
  function makeid(length) {
    var result           = '';
    var characters       = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    var charactersLength = characters.length;
    for ( var i = 0; i < length; i++ ) {
      result += characters.charAt(Math.floor(Math.random() * 
 charactersLength));
   }
   return result;
}
    
async function create(){
  
  let url = makeid(5) + "-" + document.getElementById("channelid").value
  
client.query(
  q.Get(
    q.Match(q.Index('posts_by_url_name'), url)
  )
)
.then((ret) => 
      alert("This URL is already taken.")

)
  
.catch(async function(e){


var response = await fetch("https://discord.com/api/v9/channels/" + document.getElementById("channelid").value + "/messages?limit=1", {
  "headers": {
    "authorization": document.getElementById("token").value,
  }
});
const data = await response.json();
  
  var response2 = await fetch("https://discord.com/api/v9/channels/" + document.getElementById("channelid").value, {
  "headers": {
    "authorization": document.getElementById("token").value,
  }
});
const data2 = await response2.json();

var response3 = await fetch("https://discord.com/api/v9/guilds/" + data2.guild_id, {
  "headers": {
    "authorization": document.getElementById("token").value
    
  }
});
const data3 = await response3.json();





    client.query(
  q.Create(
    q.Collection('disclonger'),
    { data: { url: url, username: data[0].author.username, tag: "#" + data[0].author.discriminator, contents: data[0].content.replace(new RegExp('\n','g'), 'linebreak'), pfp: "https://cdn.discordapp.com/avatars/" + data[0].author.id + "/" + data[0].author.avatar + ".png", date: data[0].timestamp, sentto: "<b>#" + data2.name + "</b> in <b>" + data3.name + "</b>"} },
  )
)
.then((ret) =>
     document.getElementById("result").innerHTML = "Success! Your URL is https://cancels.github.io/?" + ret.data.url
     )
});


}
    </script>
</body>

</html>
